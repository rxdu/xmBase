name: C++

on:
  push:
    branches: [ main, devel ]
  pull_request:
    branches: [ main, devel ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-22.04, ubuntu-24.04 ]
    steps:
      - uses: actions/checkout@v5
      - name: Update submodules
        run: git submodule update --init --recursive
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libeigen3-dev
      - name: Create Build Environment
        run: cmake -E make_directory ${{runner.workspace}}/build
      - name: Configure CMake
        shell: bash
        working-directory: ${{runner.workspace}}/build
        run: cmake $GITHUB_WORKSPACE -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DXMOTION_WERROR=ON
      - name: Build
        working-directory: ${{runner.workspace}}/build
        shell: bash
        run: cmake --build . --config $BUILD_TYPE

  test:
    # The type of runner that the job will run on
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-22.04, ubuntu-24.04 ]
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libeigen3-dev
      - name: Update submodules
        run: git submodule update --init --recursive
      - name: Create Build Environment
        run: cmake -E make_directory ${{runner.workspace}}/build
      - name: Configure CMake
        shell: bash
        working-directory: ${{runner.workspace}}/build
        run: cmake $GITHUB_WORKSPACE -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DBUILD_TESTING=ON -DBUILD_EXAMPLES=ON -DXMOTION_WERROR=ON
      - name: Build
        working-directory: ${{runner.workspace}}/build
        shell: bash
        run: cmake --build . --config $BUILD_TYPE
      - name: Test
        working-directory: ${{runner.workspace}}/build
        shell: bash
        run: ctest --output-on-failure --no-tests=error

  # aarch64 coverage: the seqlock/queue fence pairings must hold on a weak
  # memory model, not just x86's TSO — build + full test run on arm64.
  test-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libeigen3-dev
      - name: Update submodules
        run: git submodule update --init --recursive
      - name: Configure CMake
        shell: bash
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DBUILD_TESTING=ON -DBUILD_EXAMPLES=ON -DXMOTION_WERROR=ON
      - name: Build
        shell: bash
        run: cmake --build build -j --config $BUILD_TYPE
      - name: Test
        working-directory: build
        shell: bash
        run: ctest --output-on-failure --no-tests=error

  # The Eigen-free-core proof (0.5.0 target split, ADR 0007): no libeigen3-dev
  # installed, geometry tier off — the core target, its tests, and the bench
  # binary must configure and build with zero Eigen anywhere on the system.
  eigen-free-core:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Update submodules
        run: git submodule update --init --recursive
      - name: Configure CMake (no Eigen installed, geometry OFF)
        shell: bash
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DBUILD_TESTING=ON -DXMBASE_GEOMETRY=OFF -DXMOTION_WERROR=ON
      - name: Build
        shell: bash
        run: cmake --build build -j --config $BUILD_TYPE
      - name: Test
        working-directory: build
        shell: bash
        run: ctest --output-on-failure --no-tests=error

  # Sanitizer coverage. ASan+UBSan runs the whole suite; TSan is scoped to
  # the hand-rolled concurrency that needs race checking: the console-binding
  # concurrent-emit contract and the xmbase/concurrency primitive suite
  # (seqlock tear check, SPSC conservation, waiter hammer).
  #
  # -Wno-tsan (TSan lane only): GCC >= 13 warns that atomic_thread_fence is
  # not instrumented by TSan. The seqlock is deliberately the Boehm
  # construction — relaxed ATOMIC data words + fences — so TSan's race
  # detection is sound through the atomic accesses without modeling the
  # fences; the warning flags a known, accepted limitation, and under
  # XMOTION_WERROR it would otherwise break the lane (the xmMessaging
  # sanitize-block pattern; see message_buffer.hpp ordering notes).
  sanitizers:
    name: sanitizers (${{ matrix.name }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: asan-ubsan
            flags: "-fsanitize=address,undefined -fno-sanitize-recover=all -O1 -g"
            opts: "ASAN_OPTIONS=detect_leaks=0"
            target: ""
            filter: ""
          - name: tsan
            flags: "-fsanitize=thread -O1 -g -Wno-tsan"
            opts: "TSAN_OPTIONS=halt_on_error=1"
            target: ""
            filter: "-R 'ConsoleBinding|Concurrency'"
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libeigen3-dev
      - name: Update submodules
        run: git submodule update --init --recursive
      - name: Configure
        shell: bash
        run: >
          cmake -S . -B build -DBUILD_TESTING=ON -DXMOTION_DEV_MODE=ON -DXMOTION_WERROR=ON
          -DCMAKE_CXX_FLAGS="${{ matrix.flags }}"
          -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.flags }}"
      - name: Build
        shell: bash
        run: cmake --build build -j ${{ matrix.target }}
      - name: Test
        shell: bash
        working-directory: build
        run: ${{ matrix.opts }} ctest --output-on-failure --no-tests=error ${{ matrix.filter }}
